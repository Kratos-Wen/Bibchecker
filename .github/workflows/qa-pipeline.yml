name: Quality Assurance Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Lint with flake8
        run: |
          flake8 bibtex_refiner.py enhanced_entry_type_validator.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 bibtex_refiner.py enhanced_entry_type_validator.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test .bib file
        run: |
          cat > test_sample.bib << 'EOF'
          @article{smith2024,
            title = {A Novel Approach to Something},
            author = {Smith, John and Doe, Jane},
            year = {2024},
            journal = {Nature},
            volume = {42},
            pages = {1--10},
            doi = {10.1234/nature.2024}
          }
          
          @inproceedings{johnson2023,
            title = {Deep Learning for Everyone},
            author = {Johnson, Alice},
            booktitle = {ICML},
            year = {2023}
          }
          EOF

      - name: Run refiner on test file
        run: |
          python bibtex_refiner.py test_sample.bib -o test_sample.refined.bib --report test_sample.report.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: |
            test_sample.refined.bib
            test_sample.report.json

  extension-build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile extension
        run: npm run compile

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bibcheck-vsix
          path: '*.vsix'
